<!DOCTYPE html>
<html>

<head>
<title>The Frisbee Estate Registry</title>

<style>

body {
    background-color: #f7f0df;
    text-align: center;
    font-family: Georgia, serif;
    padding-top: 80px;
}

h1 {
    font-size: 40px;
    color: #35543a;
}

h2 {
    font-weight: normal;
    color: #8b5e5e;
}

.box {
    background: white;
    width: 70%;
    margin: auto;
    padding: 40px;
    border-radius: 20px;
}

input {
    font-size: 20px;
    padding: 15px;
    width: 60%;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    font-size: 20px;
    padding: 15px 30px;
    margin-top: 20px;
    background-color: #35543a;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

#welcome {
    margin-top: 30px;
    line-height: 1.6;
}

</style>

</head>


<body>

<div class="box">

<h1>🌹 The Frisbee Estate 🌹</h1>

<h2>Guest Registry</h2>

<p>
Kindly record your arrival so that society may properly be notified.
</p>

<br>

<input id="guestName" placeholder="Enter your name">

<br>

<button onclick="announceGuest()">
Present Myself to Society
</button>

<h2 id="welcome"></h2>

</div>


<script src="guest.js"></script>

<script>

function announceGuest(){

    let name = document.getElementById("guestName").value.trim();

    let guest = window.guests[name];

    if (guest) {

        document.getElementById("welcome").innerHTML =
        "🌹 Welcome " + guest.title +
        "<br>Your arrival has been recorded."
        + "<br><br>You belong to:"
        + "<br><strong>" + guest.society + "</strong>";

    } 
    
    else {

        document.getElementById("welcome").innerHTML =
        "The registry does not yet recognize this guest.";

    }

}

</script>


</body>

</html>
