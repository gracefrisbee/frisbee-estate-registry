<!DOCTYPE html>
<html>
<head>
<title>The Frisbee Estate Registry</title>

<style>

body {
    background-color: #f7f0df;
    text-align: center;
    font-family: Georgia, serif;
    padding-top: 80px;
}

h1 {
    font-size: 40px;
    color: #35543a;
}

h2 {
    font-weight: normal;
    color: #8b5e5e;
}

.box {
    background: white;
    width: 70%;
    margin: auto;
    padding: 40px;
    border-radius: 20px;
}

input {
    font-size: 20px;
    padding: 15px;
    width: 60%;
}

button {
    font-size: 20px;
    padding: 15px 30px;
    margin-top: 20px;
    background-color: #35543a;
    color: white;
    border: none;
    border-radius: 10px;
}

</style>

</head>

<body>

<div class="box">

<h1> The Frisbee Estate </h1>

<h2>Guest Registry</h2>

<p>
Kindly record your arrival so that society may properly be notified.
</p>

<br>

<input placeholder="Enter your name">

<br>

<button onclick="alert('Welcome to the Frisbee Estate!')">
Present Myself to Society
</button>

<h2 id="welcome"></h2>

</div>

<script src="guests.js"></script>
<script>

function announceGuest(){

let name = document.querySelector("input").value;

let guest = guests[name];

if(guest){

document.getElementById("welcome").innerHTML =
"Welcome " + guest.title + 
"<br>Your society awaits:<br>" +
guest.society;

}

else{

document.getElementById("welcome").innerHTML =
"Kindly check the registry. Your name has not yet been recorded.";

}

}

</script>
    
</body>
</html>
